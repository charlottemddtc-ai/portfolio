<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dreamy Portfolio</title>

    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: radial-gradient(circle at top left, #ffb6c1, #1e1a1d 40%);
            color: #f5e6ea;
        }

        /* HERO */
        .hero {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 80px;
        }

        .hero h1 {
            font-size: 42px;
            margin-bottom: 10px;
        }

        .hero p {
            opacity: 0.7;
            margin-bottom: 20px;
        }

        .hero button {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #ff9eb5, #d17b95);
            color: white;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 158, 181, 0.6);
            transition: 0.3s;
        }

        .hero button:hover {
            transform: scale(1.05);
        }

        .hero img {
            width: 200px;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(255, 158, 181, 0.5);
        }

        /* SECTIONS */
        section {
            padding: 60px;
            text-align: center;
        }

        /* ABOUT */
        .cards {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            width: 250px;
            box-shadow: 0 0 20px rgba(255, 158, 181, 0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 0 30px rgba(255, 158, 181, 0.5);
        }

        /* SKILLS */
        .skills span {
            display: inline-block;
            margin: 10px;
            padding: 8px 15px;
            border-radius: 20px;
            background: #2a2326;
        }

        /* PROJECTS */
        .projects {
            background: #2a2326;
        }

        /* CONTACT */
        .contact form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 400px;
            margin: auto;
        }

        .contact input,
        .contact textarea {
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #2a2326;
            color: white;
        }

        .contact button {
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #ff9eb5, #d17b95);
            color: white;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 158, 181, 0.6);
        }

        /* RESPONSIVE */
        @media(max-width:768px) {
            .hero {
                flex-direction: column;
                text-align: center;
            }

            .hero img {
                margin-top: 20px;
            }
        }
    </style>
</head>

<body>

    <!-- HERO -->
    <section class="hero">
        <div>
            <h1>Hi there, I’m Ananya</h1>
            <p>Frontend Developer & Designer crafting delicate digital blooms</p>
            <button>Discover My Creations</button>
        </div>
        <img src="https://i.imgur.com/8Km9tLL.png">
    </section>

    <!-- ABOUT -->
    <section>
        <h2>About Me</h2>
        <div class="cards">
            <div class="card">Who I Am</div>
            <div class="card">What I Love</div>
            <div class="card">Sunlight Side</div>
        </div>
    </section>

    <!-- SKILLS -->
    <section class="skills">
        <h2>Skills</h2>
        <span>HTML</span>
        <span>CSS</span>
        <span>JavaScript</span>
        <span>GSAP</span>
        <span>Figma</span>
        <span>Git</span>
    </section>

    <!-- PROJECTS -->
    <section class="projects">
        <h2>Projects</h2>
        <div class="cards">
            <div class="card">sip & bloom</div>
            <div class="card">Dreamy Portfolio</div>
            <div class="card">Nature Blog</div>
        </div>
    </section>

    <!-- CONTACT -->
    <section class="contact">
        <h2>Let’s Bloom Together</h2>
        <form>
            <input type="text" placeholder="Your Name">
            <input type="email" placeholder="Your Email">
            <textarea placeholder="Your Message"></textarea>
            <button>Send Some Sunshine</button>
        </form>
    </section>

</body>

</html>
